<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paraquite</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f14;
  color: white;
}

header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  display: grid;
  gap: 12px;
}

.song {
  background: #1c1c24;
  padding: 15px;
  border-radius: 12px;
}

.name {
  margin-bottom: 8px;
}

button {
  background: #6c5ce7;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.progress {
  width: 100%;
  height: 6px;
  background: #333;
  border-radius: 5px;
  margin-top: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00d2ff;
}
</style>
</head>

<body>

<header>🎧 Paraquite</header>

<div class="container" id="list"></div>

<script>
async function loadSongs() {
  const res = await fetch('songs.json');
  const songs = await res.json();

  const list = document.getElementById('list');

  songs.forEach((song, i) => {

    const name = song.file
      .split('/').pop()
      .replace('.mp3','');

    const div = document.createElement('div');
    div.className = 'song';

    div.innerHTML = `
      <div class="name">🎵 ${name}</div>
      <button onclick="playSong(${i})">Play</button>
      <audio id="audio${i}" src="${song.file}"></audio>
      <div class="progress"><div class="bar" id="bar${i}"></div></div>
    `;

    list.appendChild(div);

    const audio = div.querySelector('audio');
    const bar = div.querySelector('.bar');

    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100;
      bar.style.width = percent + "%";
    });
  });
}

function playSong(i) {
  const audio = document.getElementById("audio" + i);
  audio.play();
}

loadSongs();
</script>

</body>
</html>
